{% extends 'base.html' %}

{% block page_title %}Worship Home - Worship Manager{% endblock %}

{% block extra_css %}
<link href="/static/datatables.min.css" rel="stylesheet">
<script src="/static/datatables.js"></script>
<style>
.arrow {
    padding: 2px;
    margin: 2px;
}

.arrow:hover {
    cursor: pointer;
    border: 1px solid #d0d0d0;
}
  button {
    color: black;
    background-color: #fff;
    border: 1px solid #04AA6D; /* Green border */
    padding: 10px 10px; /* Some padding */
    cursor: pointer; /* Pointer/hand icon */
    border-radius: 2px;
  }

  button:hover {
    background-color: #3e8e41;
    color: #fff;
  }

  .highlight {
    background-color: #3e8e41;
    color: #fff;
  }

  .user_name:hover {
    cursor: pointer;
  }

  .fellowship:hover {
    cursor: pointer;
  }
</style>
{% endblock %}

{% block content %}
<div id="groups"></div>
<table id="people" class="display compact cell-border">
</table>
{% endblock %}

{% block extra_js %}
<script>
    let people = {{ people|safe }};
    let groups = {{ groups|safe }};
    let sundays = {{ sundays|safe }};
    let worship_id = sundays.worship_id;
    let roll_call = []
    let in_person = 0;
    let zoom = 0;
    let total = 0;
    let keyword = '';
    let $group_focused;

    html = '<div>';
    n = 1;
    for(g of groups) {
        html += '<button class="group_key" name="' + g + '" style="font-size:12px">' + g + '</button>';
    }
    html += '</div>';
    $('#groups').html(html);

    let table = new DataTable('#people', {
        info: false,
        data: people,
        columns: [
            {'title' : '<span class="arrow left" name="-1">&lt;</span>&nbsp;&nbsp;<span id="today">' + sundays.sunday + '</span>&nbsp;&nbsp;<span class="arrow ight" name="1">&gt;</span>', data: null, render: (data, type, row) => create_checkbox(data[0], data[5]), orderable: false},
            { title: 'Name', data: null, render: (data, type, row) => data[1]?'<span title="Edit">'+data[2]+' ('+data[1]+')</span>':'<span title="Edit">'+data[2]+'</span>', searchable: true, className: 'user_name' },
            { title: 'Family', visible: false, data: null, render: (data, type, row) => data[6], searchable: true },
            { title: 'Name_2', visible: false },
            { title: '團契/團體' , visible: false, searchable: true},
            { title: 'title', visible: false, searchable: false},
            { title: 'f_id', visible: false, data: null, render: (data, type, row) => data[7], searchable: false }
        ],
        info: false,
        ordering: true,
        paging: false,
        layout: {
            topStart: count_panel()
        },
        drawCallback: function (settings) {
            calculate_total();
        }

    });

    function count_panel() {
        let toolbar = document.createElement('div');
        toolbar.innerHTML = '<span id="total_label">總人數</span>：<span id="total">0</span>&nbsp;實體：<span id="in_person">0</span>&nbsp;線上：<span id="zoom">0</span>&nbsp;&nbsp;&nbsp;&nbsp;<button id="addRow">Add Guest</button>';
        return toolbar;
    }

    function create_checkbox(id, present) {
        html = '<div id="' + id + '"><button name="in"';
        if(present==1) {
            html += ' class="highlight"';
        }
        html += '>實體</button>';
        html += '<button name="out"';
        if(present==0) {
            html += ' class="highlight"';
        }
        html += '>線上</button>';
        html += '</div>';
        return html;
    }

    // Update present status when button is checked
    function update_present(id, present) {
        console.log('submitting...', id, present)
        url = API_URL + 'rollcall/' + (worship_id);
        data = {'user_id': id, 'present': present};
        $('#loading').show();
        $.ajax({
            type: "post",
            url: url,
	        data: JSON.stringify(data),
            contentType: "application/json",
            dataType: 'json',
            complete: function(response) {
                if(response.status==200) {
                    table.clear().rows.add(response.responseJSON).draw();
                    console.log('search keyword is', keyword)
                }
                $('#loading').hide();
            }
        });
    }

    function calculate_total() {
        roll_call = [];
        $('button').each(function() {
            if(this.className == 'highlight') {
                user_id = $(this).parent().attr('id');
                if(this.name == "out") {
                    roll_call.push([user_id, 0])
                }
                else if(this.name == "in") {
                    roll_call.push([user_id, 1])
                }
                else {
                    //$(this).removeClass('highlight');
                }
            }
        });
        if(roll_call.length>0) {
            $('#submit').removeAttr('disabled');
        }
        else {
            $('#submit').attr('disabled', true);
        }
        zoom = roll_call.filter(obj=>obj[1] == 0).length;
        in_person = roll_call.filter(obj=>obj[1] == 1).length;
        $('#in_person').text(in_person);
        $('#zoom').text(zoom);
        total = in_person + zoom;
        $('#total').text(total);
    }

    function user_details(d) {
        return (
            '<dl init-data="' + d[0] + '">' +
            '<dt><b>Name:</b> <input name="user_name" init-data="' + d[1] + '" value="' + d[1] + '"/>' +
            ' <b>Name (Chinese):</b> <input name="user_name_2" init-data="' + d[2] + '"  value="' + d[2] + '"/>' +
            ' <b>稱謂:</b> <input name="user_title" init-data="' + d[3] + '" value="' + d[3] + '"/></dt>' +
            '<dt><b>Email:</b> <input name="user_email" init-data="' + d[8] + '" value="' + d[8] + '"/>' +
            ' <b>Line:</b> <input name="user_line_id" init-data="' + d[9] + '" value="' + d[9] + '"/>' +
            ' <b>Discord:</b> <input name="user_discord_id" init-data="' + d[10] + '" value="' + d[10] + '"/></dt>' +
            '<dt><b>Phone:</b> <input name="user_phone" init-data="' + d[12] + '" value="' + d[12] + '"/>' +
            '<b>Family ID:</b> <input name="user_family_id" init-data="' + d[6] + '" value="' + d[6] + '"/>' +
            ' <b>註:</b> <input name="user_other" init-data="' + d[11] + '" value="' + d[11] + '"/></dt>' +
            '<dt><b>團契/團體:</b> ' + get_groups(d[4], get_group_labels) + '</dt>' +
            '<dt><button class="delete" name="' + d[0] + '" title="Delete User">Delete</button></dt></dl>'
        );
    }

    function get_group_labels(name) {
        html = '<span name="user_groups" init-data="' + name + '">';
        for(var i=0;i<groups.length;i++) {
            html += '<label for="radio-' + (i+1) + '" style="font-size:10px">' + groups[i] + '</label>';
            init_names = name.split(',');
            if (init_names.indexOf(groups[i]) >= 0) {
                html += '<input type="checkbox" checked init-id="' + groups[i] + '" init-data="' + groups[i] + '" name="radio-' + (i+1) + '" id="radio-' + (i+1) + '">';
            }
            else {
                html += '<input type="checkbox" init-id="' + groups[i] + '" init-data="' + groups[i] + '" name="radio-' + (i+1) + '" id="radio-' + (i+1) + '">';
            }
        }
        html += '</span>';
        return html;
    }

    function get_groups(element, callback) {
        if (groups.length==0) {
            url = API_URL + 'groups';
            $.when( $.ajax( url ) ).then(function( data, textStatus, jqXHR ) {
                groups = data;
                return callback(element);
            });
        }
        else {
            return callback(element);
        }
    }

    function selected_group_name(element) {
        temp = [];
        element.find('input[type="checkbox"]').each(function() {
            if(this.checked) {
                temp.push($(this).attr('init-data'));
            }
        });
        return temp.join(',');
    }

    function show_child_row(row) {
        row.child(user_details(row.data())).show();
        $( "input[type='checkbox']" ).checkboxradio({
            icon: false
        });
    }

    function submit_data(tr) {
        data = [];
        if(tr.find('td').find('input[name="user_name"]').attr('init-data') != tr.find('td').find('input[name="user_name"]').val()) {
            data.push({'name': tr.find('td').find('input[name="user_name"]').val()});
        }
        if(tr.find('td').find('input[name="user_name_2"]').attr('init-data') != tr.find('td').find('input[name="user_name_2"]').val()) {
            data.push({'name_2': tr.find('td').find('input[name="user_name_2"]').val()});
        }
        if(tr.find('td').find('input[name="user_title"]').attr('init-data') != tr.find('td').find('input[name="user_title"]').val()) {
            data.push({'title': tr.find('td').find('input[name="user_title"]').val()});
        }
        if(tr.find('td').find('input[name="user_email"]').attr('init-data') != tr.find('td').find('input[name="user_email"]').val()) {
            data.push({'email': tr.find('td').find('input[name="user_email"]').val()});
        }
        if(tr.find('td').find('input[name="user_line"]').attr('init-data') != tr.find('td').find('input[name="user_line"]').val()) {
            data.push({'line': tr.find('td').find('input[name="user_line"]').val()});
        }
        if(tr.find('td').find('input[name="user_discord"]').attr('init-data') != tr.find('td').find('input[name="user_discord"]').val()) {
            data.push({'discord': tr.find('td').find('input[name="user_discord"]').val()});
        }
        if(tr.find('td').find('input[name="user_family_id"]').attr('init-data') != tr.find('td').find('input[name="user_family_id"]').val()) {
            data.push({'family_id': tr.find('td').find('input[name="user_family_id"]').val()});
        }
        if(tr.find('td').find('input[name="user_other"]').attr('init-data') != tr.find('td').find('input[name="user_other"]').val()) {
            data.push({'other': tr.find('td').find('input[name="user_other"]').val()});
        }
        if(tr.find('td').find('input[name="user_phone"]').attr('init-data') != tr.find('td').find('input[name="user_phone"]').val()) {
            data.push({'phone': tr.find('td').find('input[name="user_phone"]').val()});
        }
        selected_groups = selected_group_name(tr.find('td').find('span[name="user_groups"]'))
        if(tr.find('td').find('span[name="user_groups"]').attr('init-data') != selected_groups) {
            data.push({'group': selected_groups.split(',')});
        }
        user_id = tr.find('td').find('dl').attr('init-data');
        if (data.length>0) {
            console.log('Updating ', user_id, ' with ', data);
            url = API_URL + 'people/' + user_id;
            data.push({'worship_id': worship_id});
            $('#loading').show();
            $.ajax({
                type: "post",
                url: url,
	            data: JSON.stringify(data),
                contentType: "application/json",
                dataType: 'json',
                complete: function(response) {
                    if(response.status==200) {
                        table.clear().rows.add(response.responseJSON).draw();
                    }
                    else {
                        table.column(4).search('').draw(false).order([6, 'asc']).draw();;
                    }
                    $('#loading').hide();
                }
            });
        }
        else if(tr.find('td').find('input[name="user_name"]').attr('init-data') == 'Guest') {
            table.clear().rows.add(people).draw();
            return false;
        }
        return true;
    }

    function is_highlight(className) {
        return className.trim().split(' ').pop() == 'highlight';
    }

    $(document).on('click', 'button.delete', function() {
        id = this.name;
        console.log(id)
        if(confirm('This will delete this user, are you sure?')) {
            url = API_URL + 'people/' + id + '?worship_id=' + worship_id;
            $('#loading').show();
            $.ajax({
                type: "delete",
                url: url,
                contentType: "application/json",
                dataType: 'json',
                complete: function(response) {
                    if(response.status==200) {
                        if(response.responseJSON.length>0) {
                            table.clear().rows.add(response.responseJSON).draw();
                        }
                        else {
                            table.clear().rows.add(people).draw();
                        }
                    }
                $('#loading').hide();
                }
            });
        }
    });

    $(document).on('click', 'button.group_key', function() {
        toggle = true;
        keyword = this.name;
        div = $(this).parent();
        div.children('button').each(function() {
            if(this.name==keyword&&is_highlight(this.className)) {
                toggle = false;
                keyword = '';
            }
            $(this).removeClass('highlight');
        });
        if(toggle) {
            $(this).addClass('highlight');
            $('#total_label').text(keyword);
            table.column(4).search((d) => d.indexOf(keyword)>=0).draw();
        }
        else {
            console.log('reset')
            $('#total_label').text('總人數');
            table.column(4).search('').draw();
        }
    });

    $(document).on('click', 'button', function() {
        clicked = this.name;
        if(clicked=='in' || clicked=='out') {
            div = $(this).parent();
            toggle = true;
            id = div.attr('id');
            div.children('button').each(function() {
                if(this.name==clicked&&this.className=='highlight') {
                    toggle = false;
                    keyword = '';
                }
                $(this).removeClass('highlight');
            });
            if (toggle) {
                $(this).addClass('highlight');
                update_present(id, clicked=='in'?1:0);
            }
            else {
                update_present(id, -1);
            }
        }
    });

    $('.arrow').click(function() {
        increment = Number($(this).attr('name'));
        id = sundays.all.indexOf($('#today').text());
        (id>sundays.all.length||id==0)?id:id += increment;
        worship_id = (worship_id+increment);
        url = API_URL + 'rollcall/' + worship_id;
        $('#loading').show();
        $.ajax({
            type: "get",
            url: url,
            contentType: "application/json",
            dataType: 'json',
            complete: function(response) {
                if(response.status==200) {
                    table.clear().rows.add(response.responseJSON).draw();
                    $('#today').html(sundays.all[id]);
                    //calculate_total();
                }
                $('#loading').hide();
            }
        });
    });

    $(document).on('click', function(e) {
        div = $(e.target);

        if(div.attr('class') == 'fellowship') {
            if($group_focused && $group_focused != div) {
            }
            else {
                $group_focused = div;
                get_groups(div, get_group_labels);
            }
        }
    });

    $(document).on('click', '.user_name', function (e) {
        let tr = e.target.closest('tr');
        let row = table.row(tr);
        if (row.child.isShown()) {
            if(submit_data(row.child())) {
                row.child.hide();
            }
        }
        else {
            show_child_row(row);
        }
    });

    $('#addRow').on('click', function() {
        rows = table.data().length
        // new data 0-11 (id, name, name_2, title, group, present, family_id, f_id, email, line_id, discord_id, other, phone)
        new_data = [0, 'Guest', '訪客', '', '訪客', 1, '', 0, '', '', '', '', ''];
        user_details(new_data)
        table.row.add(new_data).draw(false).order([6, 'asc']).draw();
        row = table.row(rows);
        show_child_row(row);
    });

</script>
{% endblock %}
