{% extends 'base.html' %}

{% block page_title %}EFCNC Announcements{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

/* Navigation Flexbox Top Row */
.dates_navigation {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    width: 66%;
    margin: 20px auto;
}


.dates_navigation_btn {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
}

#current {
    font-size: 20px;
    font-weight: 600;
}

/* Content Flexbox (contains info-list elements) */
#content {
    display:flex;
    flex-direction: column;
    gap: 10px;
    width: 66%;
    margin: 0 auto;
}

.info_list {
    display: flex;
    align-items: center;
    border-radius: 5px;
    padding: 10px 15px;
    gap: 15px;
}

.info_list:hover {
    cursor: pointer;
    filter: brightness(1.1);
}

.info_content {
    flex-grow: 1;
    outline: none;
    padding: 5px;
    word-break: break-word;
}

/* Inline Delete Icon */
.delete-inline {
    cursor: pointer;
    font-size: 18px;
    padding: 5px;
    color: #fff;
    opacity: 0.6;
    transition: opacity 0.2s, color 0.2s;
}

.delete-inline:hover {
    opacity: 1;
    color: #ffcccc; /* Light red tint on hover */
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #666;
    font-style: italic;
    background-color: #f5f5f5;
    border-radius: 5px;
    border: 1px dashed #ccc;
}

/* Action Buttons Container */
.action_btns {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 10px;
    width: 66%;
    margin: 20px auto 0 auto; /* Fixed centering here */
}

.action_btns button {
    flex: 1 1 auto; 
    min-width: 100px;
    text-align: center;
}

/* Color Coding */
.announcement {
    background-color: #556b2f;
    color: #fff;
}
.caring {
    background-color: #6b552f;
    color: #fff;
}

/* --- Mobile Specific Tweaks --- */
@media (max-width: 600px) {
    /* Revert main content wrappers to full width on small screens */
    .dates_navigation, 
    #content, 
    .action_btns {
        width: 100%;
    }

    /* Target smaller text for date ranges */
    .nav-date {
        font-size: 12px;
    }
    
    /* Make buttons slightly taller for easier touch targets */
    .dates_navigation_btn {
        padding: 8px 15px;
    }
    
    #current {
        font-size: 16px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="dates_navigation">
    <button id="previous" class="dates_navigation_btn" title="Last Week"></button>
    <span id="current"></span>
    <button id="next" class="dates_navigation_btn" title="Next Week"></button>
</div>

    <div id="content" class="content"></div>

    <div class="action_btns">
        <button id="add_1" title="Add Announcement">Add Announcement</button>
        <button id="add_2" title="Add Prayer Request">Add Prayer Request</button>
        <button id="copyall"  itle="Copy from Last Week">Copy from Last Week</button>
        <button id="copy" title="Copy all information to Clipboard"><i class="fa fa-copy"></i></button>
    </div>

<div id="clipboard" style="display:none"></div>
{% endblock %}

{% block extra_js %}
<script>
    let content = [];
    let current_week;
    id = {{ id|safe }};
    let d = new Date();
    const sundays = [];
    getSundays(new Date().getFullYear());


    $(document).ready(function () {
            d.setDate(d.getDate() - d.getDay() + 7); // coming Sunday
            index = sundays.indexOf(d.toLocaleDateString('en-CA'));
            current_week =  sundays[index];
        $('#current').html(current_week);
        get_info(id);
        showDatesNavigation(index);
    });

    // Inline Delete Handler
    $(document).on('click', '.delete-inline', function() {
        let index = $(this).closest('.info_list').attr('name');
        let item = content[index];
        
        // If the item hasn't been saved to the DB yet (ID is -1)
        if (item.id === -1) {
            $(this).closest('.info_list').remove();
            checkEmptyState();
            return;
        }

        if(confirm("Are you sure you want to delete this item?")) {
            url = API_URL + 'info/delete/' + item.id;
            $('#loading').show();
            $.when( $.ajax( url ) ).then(function( response, textStatus, jqXHR ) {
                if(response) {
                    get_info(id);
                    $('#loading').hide();
                }
            });
        }
    });

    $('#copyall').on('click', function() {
        d1 = current_week;
        d2 = sundays[sundays.indexOf(current_week)-1];
        url = API_URL + 'info/duplicate?d1=' + d1 + '&d2=' + d2;
        $('#loading').show();
        $.when( $.ajax( url ) ).then(function( response, textStatus, jqXHR ) {
            if(response) {
                get_info(id);
                $('#loading').hide();
            }
        });
    });

    $("#copy").click(function() {
        // Map the content and join lines with a newline break
        let textToCopy = content.map(obj => obj.info).join('\n');
        
        navigator.clipboard.writeText(textToCopy).then(function() {
            // Optional: Provide visual feedback here (like changing the icon to a checkmark)
            console.log('Copying to clipboard was successful!');
        }).catch(function(err) {
            console.error('Could not copy text: ', err);
        });
    });

    $(document).on('blur', '.info_content', function() {
        tt = $(this).text();
        if (tt == '') {
            $(this).closest('.info_list').remove();
            checkEmptyState();
            return false;
        }
        
        let itemIndex = $(this).closest('.info_list').attr('name');
        cc = content[itemIndex];

        if(tt!= cc.info) {  // content changed
            cc.info = tt;
            url = API_URL + 'info/edit';
            data = cc;
            $('#loading').show();
            $.ajax({
                type: "post",
                url: url,
	            data: JSON.stringify(data),
                contentType: "application/json",
                dataType: 'json',
                complete: function(response) {
          	        if(response.status==200) {
                        get_info(id);
                    }
                    $('#loading').hide();
                }
            });
        }
    });

    $('.dates_navigation_btn').on('click', function() {
        index = sundays.indexOf($(this).val());
        current_week = sundays[index];
        get_info(index);
        showDatesNavigation(index);
        $('#current').html(current_week);
    });

    $('#add_1').click(function() {
        $('.empty-state').remove(); // Clear empty state if present
        let newIndex = content.length;
        $("#content").append('<div name="' + newIndex + '" class="info_list announcement"><span class="info_content" contenteditable="true" spellcheck="true" autocorrect="on" autocapitalize="sentences"></span><i class="fa fa-trash-o delete-inline" title="Delete"></i></div>');
        $("#content .info_list").last().find('span').focus();
        content.push({'id': -1, 'info': 'New Announcement', 'type': 'announcement', 'date': current_week});
    });

    $('#add_2').click(function() {
        $('.empty-state').remove(); // Clear empty state if present
        let newIndex = content.length;
        $("#content").append('<div name="' + newIndex + '" class="info_list caring"><span class="info_content" contenteditable="true" spellcheck="true" autocorrect="on" autocapitalize="sentences"></span><i class="fa fa-trash-o delete-inline" title="Delete"></i></div>');
        $("#content .info_list").last().find('span').focus();
        content.push({'id': -1, 'info': 'New Prayer Request', 'type': 'caring', 'date': current_week});
    });

    function getSundays(year) {
        var i = year-1;
        while (i <= year) {
            let date = new Date(i, 0, 1); // January 1 of the specified year
            date.setDate(date.getDate() + (7 - date.getDay()) % 7); // Find the first Sunday
            while (date.getFullYear() === i) {
                sundays.push(new Date(date).toLocaleDateString('en-CA')); // Add the Sunday to the array
                date.setDate(date.getDate() + 7); // Move to the next Sunday
            }
            i++;
        }
    }

    function showDatesNavigation(i) {
        if (i > 0) {
            $('#previous').html('<i class="fa fa-chevron-left"></i> <span class="nav-date">' + sundays[i-1] + '</span>');
            $('#previous').val(sundays[i-1]);
        }
        
        if (i < sundays.length-1) {
            $('#next').html('<span class="nav-date">' + sundays[i+1] + '</span> <i class="fa fa-chevron-right"></i>');
            $('#next').val(sundays[i+1]);
        }
    }

    function get_info(id) {
        $('#loading').show();
        url = API_URL + 'info/'+id;
        $.when( $.ajax( url ) ).then(function( response, textStatus, jqXHR ) {
            if(response) {
                content = response;
                html = '';
                i = 0;
                $.each(content, function() {
                    if (this.info) {
                        html += '<div name="' + i + '" class="info_list ' + this.type + '"  title="' + this.type + '"><span class="info_content" contenteditable="true" spellcheck="true" autocorrect="on" autocapitalize="sentences">' + this.info + '</span><i class="fa fa-trash-o delete-inline" title="Delete"></i></div>';
                        i++;
                    }
                });
            }
            // Empty State Check
            if (html === '') {
                html = '<div class="empty-state">No announcements or prayer requests for this week.</div>';
            }

            $('#content').html(html);
            $('#loading').hide();
        });
    }

    // Helper to add the empty state back if the user manually deletes everything
    function checkEmptyState() {
        if ($('#content').children('.info_list').length === 0) {
            $('#content').html('<div class="empty-state">No announcements or prayer requests for this week.</div>');
        }
    }
</script>
{% endblock %}
