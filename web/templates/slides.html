<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slide Menu</title>
    <style>
        html {
            height: 100%;
            background-color: #000;
        }

        body {
            margin: 0; 
            color: white; 
        }

        /* Targeted styling instead of styling all divs globally */
        .menu-container {
            padding: 30px 10px;
        }

        .menu-btn {
            font-size: 30px;
            margin-right: 5px; /* Replaces the hardcoded &nbsp; in your old HTML */
            cursor: pointer;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Target the buttons specifically by their class
            $('.menu-btn').click(function() {
                // Added 'const' to properly declare the variable
                const name = $(this).attr('name');
                window.location.href = '/slides/' + name;
            });
        });
    </script>
</head>
<body>

    <div class="menu-container">
        <button class="menu-btn" name="admin">Admin</button>
        <button class="menu-btn" name="lead">Lead</button>
        <button class="menu-btn" name="view">View</button>
        <button class="menu-btn" name="musician">Musician</button>
        <button class="menu-btn" name="score">Score</button>
    </div>

</body>
</html>
